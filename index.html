    content: "▍";
    display: inline-block;
    margin-left: 2px;
    color: #D97757;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .marquee {
    mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 2px 10px;
    border-radius: 999px;
    border: 1px solid rgba(27,22,20,0.12);

    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 60;
    width: 340px;
    max-width: calc(100vw - 32px);

    backdrop-filter: saturate(1.2) blur(8px);
    background: rgba(251,246,238,0.7);
    border: 1px solid rgba(27,22,20,0.10);
  }

    position: relative;
    color: #A34A2D;
    text-decoration: none;
    background-image: linear-gradient(#D97757, #D97757);
    background-size: 100% 1px;
    background-position: 0 100%;
    background-repeat: no-repeat;
    transition: background-size .25s ease;
  }
  a.pretty:hover { background-size: 100% 3px; }

  @keyframes slide-x {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .ticker-row { animation: slide-x 50s linear infinite; }
  .ticker-row:hover { animation-play-state: paused; }

  .dashed-under { border-bottom: 1.5px dashed rgba(27,22,20,0.3); }

  /* Vertical progress rail */
  .rail {
    background: linear-gradient(#D97757, #D97757);
    background-size: 100% var(--p,0%);
    background-repeat: no-repeat;
    background-color: rgba(27,22,20,0.08);

    background:

        transparent 0,
        transparent 27px,
        rgba(27,22,20,0.06) 27px,
        rgba(27,22,20,0.06) 28px

  }

  .hide-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(27,22,20,0.25); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(217,119,87,0.55); }

  .live-dot {
    width: 8px; height: 8px; border-radius: 999px; background: #6A7A3E;
    box-shadow: 0 0 0 0 rgba(106,122,62,0.45);

/* ---------- Typing terminal ---------- */
function useTypewriter(lines, speed = 18, gap = 350) {
  const [idx, setIdx] = useState(0);
  const [out, setOut] = useState([]);
  const [typing, setTyping] = useState("");
  useEffect(() => {
    if (idx >= lines.length) return;
    const line = lines[idx];
    let i = 0;
    setTyping("");
    const t = setInterval(() => {
      i++;
      setTyping(line.slice(0, i));
      if (i >= line.length) {
        clearInterval(t);
        setTimeout(() => {
          setOut((o) => [...o, line]);
          setTyping("");
          setIdx((n) => n + 1);
        }, gap);
      }
    }, speed);
    return () => clearInterval(t);
  }, [idx, lines, speed, gap]);
  return { done: out, typing, finished: idx >= lines.length };
}

function TerminalWindow({ title = "~/projects/acme — claude", children, live = false, className = "" }) {
  return (
    <div className={`term scanline relative ${className}`}>

function AutoTerminal({ lines, className = "", title }) {
  const ref = useRef(null);
  const inView = useInView(ref, { amount: 0.4, once: true });
  const [start, setStart] = useState(false);
  useEffect(() => { if (inView) setStart(true); }, [inView]);
  const tw = useTypewriter(start ? lines : [], 14, 260);
  return (
    <div ref={ref} className={className}>
      <TerminalWindow title={title || "~/projects/acme — claude"} live={!tw.finished}>
        {tw.done.map((l, i) => (
          <div key={i} className={l.startsWith("$") ? "text-coral-300" : (l.startsWith("//") ? "text-paper-300/60" : "text-paper-100")}>
            {l.startsWith("$") ? <span className="text-moss-500 mr-2">$</span> : null}
            {l.startsWith("$") ? l.slice(1).trim() : l}
          </div>
        ))}
        {!tw.finished && (
          <div className={tw.typing.startsWith("$") ? "text-coral-300" : "text-paper-100"}>
            {tw.typing.startsWith("$") ? <span className="text-moss-500 mr-2">$</span> : null}
            <span className="caret">{tw.typing.startsWith("$") ? tw.typing.slice(1).trim() : tw.typing}</span>
          </div>
        )}
      </TerminalWindow>
    </div>
  );
}

function CostMathSection() {
  const [m, setM] = useState("sonnet");
  const mult = m === "opus" ? 5/3 : m === "haiku" ? 1/3 : 1;
  const base = { input: 120_000, cacheHit: 360_000, output: 18_000, cacheWrite: 20_000 };
  // per-M prices (model-agnostic — we scale Sonnet base)
  const price = { sonnet: {in:3,out:15}, haiku: {in:1,out:5}, opus: {in:5,out:25} };
  const p = price[m];
  const inCost = (base.input/1e6) * p.in;
  const hitCost = (base.cacheHit/1e6) * p.in * 0.1;
  const writeCost = (base.cacheWrite/1e6) * p.in;
  const outCost = (base.output/1e6) * p.out;
  const total = inCost + hitCost + writeCost + outCost;
  const naive = ((base.input + base.cacheHit)/1e6) * p.in + outCost; // no cache
  const savings = ((naive - total)/naive * 100).toFixed(0);
  return (
    <section id="costmath" className="relative py-28">
      <div className="max-w-[1200px] mx-auto px-6">
        <SectionHeading kicker="Cost math, worked"
          title={<>Where the <em className="display-wonk text-coral-600">dollars</em> actually go.</>}
          lede="A single half-day feature session. Real numbers. Toggle the model to see how much the choice changes the bill — and how much caching alone saves, regardless of model." />

        <div className="mt-10 flex gap-2 flex-wrap">
          {MODELS.map(md => (
            <button key={md.key} onClick={() => setM(md.key)}
              className={`px-4 py-2 rounded-full text-sm font-medium border transition
                ${m === md.key ? "bg-ink-900 text-paper-100 border-ink-900" : "bg-paper-50 text-ink-800 border-ink-900/10 hover:border-ink-900/30"}`}>
              <span className="inline-flex items-center gap-2"><Dot color={md.dot}/> {md.name}</span>
            </button>
          ))}
        </div>

        <div className="mt-8 grid lg:grid-cols-[1.2fr_1fr] gap-8 items-start">
          <Reveal>
            <div className="card p-7">
              <div className="mono text-[11px] uppercase tracking-widest text-coral-700">Session ledger</div>
              <h3 className="display text-2xl mt-1">One feature, billed in detail</h3>
              <div className="mt-5 space-y-3 text-sm">
                {[
                  ["Input tokens (new)",             base.input.toLocaleString(),      `$${inCost.toFixed(3)}`, `${p.in} / M input`],
                  ["Cache reads (CLAUDE.md, sys)",   base.cacheHit.toLocaleString(),   `$${hitCost.toFixed(3)}`, `10% of ${p.in}/M`],
                  ["Cache writes",                   base.cacheWrite.toLocaleString(), `$${writeCost.toFixed(3)}`, `${p.in} / M input`],
                  ["Output tokens",                  base.output.toLocaleString(),     `$${outCost.toFixed(3)}`, `${p.out} / M output`],
                ].map(([k, tok, $, note]) => (
                  <div key={k} className="grid grid-cols-[1.3fr_1fr_0.8fr_1.2fr] gap-3 items-baseline py-1.5 border-b border-ink-900/5">
                    <div className="text-ink-800">{k}</div>
                    <div className="mono text-ink-600">{tok} tok</div>
                    <div className="display text-lg text-ink-900">{$}</div>
                    <div className="text-xs text-ink-500 mono">{note}</div>
                  </div>
                ))}
                <div className="grid grid-cols-[1.3fr_1fr_0.8fr_1.2fr] gap-3 items-baseline pt-3">
                  <div className="display text-xl">Total</div>
                  <div />
                  <div className="display text-3xl text-coral-600">${total.toFixed(2)}</div>
                  <div className="text-xs mono text-moss-700">cache saves {savings}% vs no-cache</div>
                </div>
              </div>
            </div>
          </Reveal>

          <Reveal delay={0.1}>
            <div className="card p-7">
              <h3 className="display text-2xl">Three takeaways</h3>
              <ul className="mt-4 space-y-4 text-ink-700">
                <li className="flex gap-3"><Coins className="w-5 h-5 text-coral-600 shrink-0 mt-1" />

function MiniTerm({ section }) {
  const [open, setOpen] = useState(true);
  const hintsFor = (k) => {
    switch (k) {
      case "top":       return ["$ claude                      # start a session"];
      case "what":      return ["// Claude Code = terminal-native agent"];
      case "ecosystem": return ["// Same agent · six surfaces",  "$ claude           # cli"];
      case "models":    return ["$ /model                      # swap", "$ /effort high                # plan deeper"];
      case "usage":     return ["$ /cost                       # this session", "$ open platform.claude.com/usage"];
      case "loop":      return ["// read → plan → tool_use → tool_result → repeat", "// 10 built-in tools · parallel calls"];
      case "commands":  return ["$ /help                       # list them all"];
      case "commandsdeep": return ["$ /help /compact              # per-command help", "// setup · session · context · ops · quality"];
      case "custom":    return ["$ mkdir -p .claude/commands", "$ echo '---\\ndescription: ship\\n---' > .claude/commands/ship.md"];
      case "hooks":     return ["$ /hooks                      # interactive editor"];
      case "context":   return ["$ /compact                    # at ~50%", "$ /clear                      # between tasks"];
      case "ctxadv":    return ["// ~/.claude/CLAUDE.md  →  project  →  dir", "// @imports · 5-hop limit"];
      case "limits":    return ["$ /compact \"keep: the plan\"", "$ /rewind                     # surgical pruning", "// subagents + markdown = 65–90% fewer tokens"];
      case "subagents": return ["// Task tool · isolation: 'worktree'", "// parallel subagents > one giant context"];
      case "plugins":   return ["$ /plugin install superpowers"];
      case "pluginsdeep": return ["$ /superpowers:brainstorm \"idea\"", "$ /mem:recall auth", "$ /specify  →  /plan  →  /tasks"];
      case "mcp":       return ["$ /mcp install context7"];
      case "skills":    return ["$ open https://skills.sh"];
      case "tokens":    return ["// cache + model choice = 40–70% off"];
      case "costmath":  return ["// cache_read = 10% of input price", "// Haiku 4.5 ≈ 3× cheaper than Sonnet"];
      case "spec":      return ["$ /spec \"feature\"",  "$ /design",  "$ /tasks"];
      case "case":      return ["// reproduce → bisect → hypothesize → patch → verify"];
      case "roles":     return ["// leads · devs · QAs — same tool, different playbooks"];
      case "whatsnew":  return ["// Oct 2025 → Apr 2026 · 15 shipments that matter", "$ /model opus-4.7-auto"];
      case "resources": return ["$ open https://code.claude.com/docs"];
      default: return ["$ claude"];
    }
  };
  const [linesKey, setLinesKey] = useState(section);
  useEffect(() => { setLinesKey(section); }, [section]);
  const lines = hintsFor(linesKey);
  return (
    <div className="mini-term">
      <AnimatePresence>
        {open && (
          <motion.div
            key="mini"
            initial={{ opacity: 0, y: 20, scale: 0.98 }}
            animate={{ opacity: 1, y: 0, scale: 1 }}
            exit={{ opacity: 0, y: 20, scale: 0.98 }}
            transition={{ duration: 0.3 }}
          >
            <div className="term shadow-deep">
              <div className="term-head flex items-center px-3 py-2">
                <span className="term-dot mr-1.5" style={{background:"#E8574A"}}/>
                <span className="term-dot mr-1.5" style={{background:"#E8B83E"}}/>
                <span className="term-dot" style={{background:"#6FBE6A"}}/>
                <span className="mono text-[10px] text-paper-300/70 ml-2 truncate">cheat-sheet · {section}</span>
                <button onClick={() => setOpen(false)} className="ml-auto text-paper-300/60 hover:text-paper-100">
                  <Minus className="w-3.5 h-3.5" />
                </button>
              </div>
              <div className="p-3 mono text-[12px] leading-relaxed">
                <AnimatePresence mode="wait">
                  <motion.div key={linesKey} initial={{ opacity: 0, y: 6 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -6 }} transition={{ duration: 0.2 }}>
                    {lines.map((l, i) => (
                      <div key={i} className={l.startsWith("$") ? "text-coral-300" : "text-paper-300/70"}>
                        {l.startsWith("$") ? <span className="text-moss-500 mr-2">$</span> : null}
                        {l.startsWith("$") ? l.slice(1).trim() : l}
                      </div>
                    ))}
                    <div className="text-coral-300 caret" />
                  </motion.div>
                </AnimatePresence>
              </div>
            </div>
          </motion.div>
        )}
      </AnimatePresence>
      {!open && (
        <button onClick={() => setOpen(true)} className="bg-ink-900 text-coral-300 mono text-xs rounded-full px-4 py-2 shadow-deep hover:bg-ink-800 transition flex items-center gap-2">
          <Terminal className="w-3.5 h-3.5" /> cheat-sheet
        </button>
      )}
    </div>
  );
}

function useActiveSection(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const obs = new IntersectionObserver(
      (entries) => {
        const vis = entries
          .filter(e => e.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
        if (vis[0]) setActive(vis[0].target.id);
      },
      { rootMargin: "-40% 0px -50% 0px", threshold: [0, 0.25, 0.5, 0.75, 1] }
    );
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, [ids.join(",")]);
  return active;
}

function App() {
  const ids = ["top", ...NAV.map(([k]) => k)];
  const active = useActiveSection(ids);
  const onJump = (id) => {

    <>

      </footer>

}
